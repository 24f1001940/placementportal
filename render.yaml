services:
  - type: web
    name: placementportal-backend
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    disk:
      name: resume-uploads
      mountPath: /app/uploads
      sizeGB: 5
    envVars:
      - key: DB_URL
        fromDatabase:
          name: placementportal-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: placementportal-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: placementportal-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: JPA_DDL_AUTO
        value: update
      - key: CACHE_TYPE
        value: simple
      - key: RABBIT_LISTENER_AUTO_STARTUP
        value: "false"
      - key: FRONTEND_ORIGIN
        value: https://placementportal-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /app/uploads/resumes

  - type: web
    name: placementportal-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://placementportal-backend.onrender.com/api

databases:
  - name: placementportal-db
    region: oregon
    plan: basic-256mb
    databaseName: placementportal
    user: placementportal
