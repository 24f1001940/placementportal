services:
  - type: web
    name: placementportal-backend
    env: docker
    rootDir: backend
    plan: starter
    dockerfilePath: Dockerfile
    envVars:
      - key: DB_URL
        fromDatabase:
          name: placementportal-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: placementportal-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: placementportal-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: JPA_DDL_AUTO
        value: update
      - key: CACHE_TYPE
        value: simple
      - key: RABBIT_LISTENER_AUTO_STARTUP
        value: "false"
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: "6379"
      - key: RABBITMQ_HOST
        value: localhost
      - key: RABBITMQ_PORT
        value: "5672"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /app/uploads/resumes

  - type: web
    name: placementportal-frontend
    env: docker
    rootDir: frontend
    plan: starter
    dockerfilePath: Dockerfile
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: placementportal-db
    plan: starter
