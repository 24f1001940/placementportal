spring.application.name=placementportal
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:mem:placement_portal_local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.cache.type=${CACHE_TYPE:simple}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:placement}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:placement}
spring.rabbitmq.listener.simple.auto-startup=${RABBIT_LISTENER_AUTO_STARTUP:false}
spring.rabbitmq.listener.direct.auto-startup=${RABBIT_LISTENER_AUTO_STARTUP:false}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
spring.docker.compose.enabled=false

app.jwt.secret=${JWT_SECRET:local-development-secret-change-me-at-least-32-chars}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.upload-dir=${UPLOAD_DIR:uploads/resumes}
app.frontend-origin=${FRONTEND_ORIGIN:http://localhost:5173}
