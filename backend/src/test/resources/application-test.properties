spring.datasource.url=jdbc:h2:mem:placement_portal_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.cache.type=simple
spring.docker.compose.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false
app.jwt.secret=test-secret-with-more-than-thirty-two-characters
app.jwt.expiration-minutes=60
app.upload-dir=build/test-uploads
